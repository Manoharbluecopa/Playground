<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <title>Split Settle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #111827;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --green: #16a34a;
      --green-light: #f0fdf4;
      --red: #dc2626;
      --red-light: #fef2f2;
      --bg: #ffffff;
      --bg-secondary: #f9fafb;
      --surface: #ffffff;
      --text: #111827;
      --text-secondary: #6b7280;
      --text-tertiary: #9ca3af;
      --border: #e5e7eb;
      --border-light: #f3f4f6;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
    }

    .view { display: none; }
    .view.active { display: block; }

    /* Header */
    .header {
      background: var(--bg);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }
    .header h1 { font-size: 18px; font-weight: 700; color: var(--text); }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn, .icon-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .back-btn:active, .icon-btn:active { opacity: 0.5; }

    /* Content */
    .content { padding: 20px; max-width: 480px; margin: 0 auto; }

    /* Summary Dashboard */
    .dashboard {
      margin-bottom: 24px;
    }
    .dashboard-total {
      text-align: center;
      padding: 24px 0 16px;
    }
    .dashboard-total .label {
      font-size: 13px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .dashboard-total .amount {
      font-size: 40px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -1px;
    }
    .dashboard-stats {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
    .stat-card {
      flex: 1;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-align: center;
    }
    .stat-card .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }
    .stat-card .stat-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-top: 2px;
    }

    /* Section headers */
    .section-header {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 0 10px;
    }

    /* Card row */
    .card-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: stretch;
    }

    /* People cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex: 1;
      min-width: 0;
      transition: background 0.15s;
    }
    .card:active { background: var(--bg-secondary); }
    .card-content { flex: 1; display: flex; justify-content: space-between; align-items: center; min-width: 0; }
    .card-name { font-weight: 600; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-due {
      text-align: right;
      white-space: nowrap;
      margin-left: 12px;
    }
    .card-due .due-amount { font-weight: 700; font-size: 15px; color: var(--text); }
    .card-due .due-label { font-size: 11px; color: var(--text-tertiary); }

    /* Action buttons on cards */
    .card-action {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      min-width: 52px;
    }
    .card-action:active { opacity: 0.7; }
    .card-action.increment {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .card-action.increment.flash { background: var(--green); border-color: var(--green); }
    .card-action.expense {
      background: var(--surface);
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Delete button on card */
    .card-delete {
      color: var(--text-tertiary);
      font-size: 16px;
      padding: 4px 8px;
      min-width: 36px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
    }
    .card-delete:active { color: var(--red); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-secondary);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; display: block; opacity: 0.4; }
    .empty-state p { margin-bottom: 4px; font-size: 14px; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      width: 100%;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-green { background: var(--green); color: white; }
    .btn-outline { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

    /* Increment button (person detail) */
    .increment-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 24px;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin: 16px 0;
      min-height: 72px;
      transition: opacity 0.15s, background 0.15s;
    }
    .increment-btn:active { opacity: 0.8; }
    .increment-btn.flash { background: var(--green); }

    /* Person detail header */
    .person-summary {
      text-align: center;
      padding: 20px 0;
    }
    .person-summary .due-label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .person-summary .due-amount {
      font-size: 36px;
      font-weight: 800;
      color: var(--text);
      margin: 4px 0;
      letter-spacing: -1px;
    }
    .person-summary .settled { color: var(--green); }

    /* Action row in person detail */
    .action-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .action-row .btn { flex: 1; }

    /* Forms */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 16px;
      outline: none;
      background: var(--bg);
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--accent); }

    /* Inline form */
    .inline-form {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      display: none;
    }
    .inline-form.open { display: block; }
    .inline-form .form-row { display: flex; gap: 8px; }
    .inline-form .form-row input { flex: 1; }
    .inline-form .form-row .btn { width: auto; padding: 12px 20px; }

    /* History list */
    .history-list { margin-top: 20px; }
    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .history-item:last-child { border-bottom: none; }
    .history-info { flex: 1; }
    .history-amount { font-weight: 700; font-size: 15px; }
    .history-amount.expense-type { color: var(--red); }
    .history-amount.payment-type { color: var(--green); }
    .history-note { font-size: 13px; color: var(--text-secondary); margin-top: 1px; }
    .history-date { font-size: 12px; color: var(--text-tertiary); margin-top: 1px; }
    .history-tag {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px;
    }
    .tag-expense { background: var(--red-light); color: var(--red); }
    .tag-payment { background: var(--green-light); color: var(--green); }
    .delete-btn {
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-size: 16px;
      cursor: pointer;
      padding: 8px;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .delete-btn:active { color: var(--red); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--primary);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      z-index: 100;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Saved message */
    .saved-msg {
      color: var(--green);
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
      margin-left: 12px;
    }
    .saved-msg.show { opacity: 1; }

    /* Storage warning */
    .storage-warning {
      background: #fffbeb;
      color: #92400e;
      padding: 10px 16px;
      text-align: center;
      font-size: 13px;
      border-bottom: 1px solid #fde68a;
    }

    /* Recent activity */
    .recent-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .recent-item:last-child { border-bottom: none; }
    .recent-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .recent-dot.expense { background: var(--red); }
    .recent-dot.payment { background: var(--green); }
    .recent-text { flex: 1; font-size: 13px; color: var(--text-secondary); }
    .recent-text strong { color: var(--text); font-weight: 600; }
    .recent-time { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; }

    /* Divider */
    .divider { height: 1px; background: var(--border); margin: 20px 0; }
  </style>
</head>
<body>

<div id="storage-warning" class="storage-warning" style="display:none">
  localStorage is unavailable. Your data will not be saved.
</div>

<!-- HOME VIEW -->
<div id="view-home" class="view">
  <div class="header">
    <div class="header-left">
      <h1>Split Settle</h1>
    </div>
    <button class="icon-btn" onclick="navigateTo('settings')" aria-label="Settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
  <div class="content">
    <div id="dashboard"></div>
    <div id="people-list"></div>
    <button class="btn btn-outline" onclick="toggleAddPerson()" id="add-person-toggle" style="margin-top:8px">+ Add Person</button>
    <div id="add-person-form" class="inline-form" style="margin-top:12px">
      <div class="form-row">
        <input type="text" id="person-name-input" placeholder="Person name" maxlength="50" autocomplete="off">
        <button class="btn btn-primary" onclick="addPerson()">Add</button>
      </div>
    </div>
    <div id="recent-activity" style="margin-top:20px"></div>
  </div>
</div>

<!-- PERSON DETAIL VIEW -->
<div id="view-person" class="view">
  <div class="header">
    <div class="header-left">
      <button class="back-btn" onclick="navigateTo('')" aria-label="Go back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <h1 id="person-name"></h1>
    </div>
  </div>
  <div class="content">
    <div class="person-summary">
      <div class="due-label">Due</div>
      <div class="due-amount" id="person-due-amount"></div>
    </div>

    <button class="increment-btn" id="increment-btn" onclick="quickIncrement()"></button>

    <div class="action-row">
      <button class="btn btn-outline" onclick="toggleAddExpense()">+ Expense</button>
      <button class="btn btn-green" onclick="toggleSettleForm()">Settle</button>
    </div>

    <div id="add-expense-form" class="inline-form">
      <div class="form-group">
        <label for="expense-amount-input">Amount</label>
        <input type="number" id="expense-amount-input" placeholder="Enter amount" min="1" max="999999" inputmode="numeric">
      </div>
      <div class="form-group">
        <label for="expense-note-input">Note (optional)</label>
        <input type="text" id="expense-note-input" placeholder="What was this for?" maxlength="200" autocomplete="off">
      </div>
      <button class="btn btn-accent" onclick="addExpense()">Add Expense</button>
    </div>

    <div id="settle-form" class="inline-form">
      <div class="form-group">
        <label for="settle-amount-input">Payment Amount</label>
        <input type="number" id="settle-amount-input" placeholder="Amount paid" min="1" max="999999" inputmode="numeric">
      </div>
      <div class="form-group">
        <label for="settle-note-input">Note (optional)</label>
        <input type="text" id="settle-note-input" placeholder="e.g. UPI, Cash" maxlength="200" autocomplete="off">
      </div>
      <div class="action-row">
        <button class="btn btn-outline" id="settle-full-btn" onclick="settleFull()">Pay Full</button>
        <button class="btn btn-green" onclick="settlePartial()">Record Payment</button>
      </div>
    </div>

    <div class="history-list">
      <div class="section-header">History</div>
      <div id="history-items"></div>
    </div>
  </div>
</div>

<!-- SETTINGS VIEW -->
<div id="view-settings" class="view">
  <div class="header">
    <div class="header-left">
      <button class="back-btn" onclick="navigateTo('')" aria-label="Go back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <h1>Settings</h1>
    </div>
  </div>
  <div class="content">
    <div class="form-group">
      <label for="increment-amount-input">Quick Increment Amount</label>
      <input type="number" id="increment-amount-input" min="1" max="999999" inputmode="numeric">
    </div>
    <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    <span class="saved-msg" id="saved-msg">Saved!</span>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
  // ── Storage Check ──
  const storageAvailable = (() => {
    try {
      const t = '__test__';
      localStorage.setItem(t, t);
      localStorage.removeItem(t);
      return true;
    } catch { return false; }
  })();

  if (!storageAvailable) {
    document.getElementById('storage-warning').style.display = 'block';
  }

  // ── Store ──
  const Store = {
    _get(key) {
      if (!storageAvailable) return null;
      try { return JSON.parse(localStorage.getItem(key)); } catch { return null; }
    },
    _set(key, val) {
      if (!storageAvailable) return;
      localStorage.setItem(key, JSON.stringify(val));
    },

    getPeople() {
      return (this._get('et_people') || []).sort((a, b) => a.name.localeCompare(b.name));
    },
    addPerson(name) {
      const people = this._get('et_people') || [];
      const person = { id: crypto.randomUUID(), name: name.trim(), createdAt: new Date().toISOString() };
      people.push(person);
      this._set('et_people', people);
      return person;
    },
    deletePerson(id) {
      const people = (this._get('et_people') || []).filter(p => p.id !== id);
      this._set('et_people', people);
      const entries = (this._get('et_entries') || []).filter(e => e.personId !== id);
      this._set('et_entries', entries);
    },
    getPerson(id) {
      return (this._get('et_people') || []).find(p => p.id === id) || null;
    },

    // Entries: both expenses and payments
    getEntries(personId) {
      return (this._get('et_entries') || [])
        .filter(e => e.personId === personId)
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    },
    getAllEntries() {
      return (this._get('et_entries') || [])
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    },
    addEntry(personId, amount, type, note) {
      const entries = this._get('et_entries') || [];
      const entry = {
        id: crypto.randomUUID(),
        personId,
        amount: Math.round(Math.abs(amount)),
        type, // 'expense' or 'payment'
        note: note ? note.trim().slice(0, 200) : null,
        createdAt: new Date().toISOString()
      };
      entries.push(entry);
      this._set('et_entries', entries);
      return entry;
    },
    deleteEntry(id) {
      const entries = (this._get('et_entries') || []).filter(e => e.id !== id);
      this._set('et_entries', entries);
    },

    getDueForPerson(personId) {
      const entries = this.getEntries(personId);
      return entries.reduce((sum, e) => {
        return e.type === 'expense' ? sum + e.amount : sum - e.amount;
      }, 0);
    },

    getTotalDue() {
      const people = this.getPeople();
      return people.reduce((sum, p) => {
        const due = this.getDueForPerson(p.id);
        return sum + Math.max(0, due);
      }, 0);
    },

    getSettings() {
      return this._get('et_settings') || { incrementAmount: 50 };
    },
    updateSettings(settings) {
      this._set('et_settings', { ...this.getSettings(), ...settings });
    },

    // Migrate old data format (et_expenses -> et_entries)
    migrate() {
      const oldExpenses = this._get('et_expenses');
      if (oldExpenses && oldExpenses.length > 0) {
        const entries = this._get('et_entries') || [];
        oldExpenses.forEach(e => {
          entries.push({
            id: e.id,
            personId: e.personId,
            amount: e.amount,
            type: 'expense',
            note: e.note || null,
            createdAt: e.createdAt
          });
        });
        this._set('et_entries', entries);
        localStorage.removeItem('et_expenses');
      }
    }
  };

  // Run migration
  Store.migrate();

  // ── Format Helpers ──
  function formatINR(amount) {
    if (amount === 0) return '\u20b90';
    const s = Math.abs(amount).toString();
    let result;
    if (s.length <= 3) {
      result = s;
    } else {
      result = s.slice(-3);
      let remaining = s.slice(0, -3);
      while (remaining.length > 2) {
        result = remaining.slice(-2) + ',' + result;
        remaining = remaining.slice(0, -2);
      }
      if (remaining.length > 0) result = remaining + ',' + result;
    }
    return (amount < 0 ? '-' : '') + '\u20b9' + result;
  }

  function formatDate(iso) {
    const date = new Date(iso);
    const now = new Date();
    const diffMs = now - date;
    const diffMin = Math.floor(diffMs / 60000);
    const diffHr = Math.floor(diffMs / 3600000);
    const diffDay = Math.floor(diffMs / 86400000);

    if (diffMin < 1) return 'Just now';
    if (diffMin < 60) return diffMin + 'm ago';
    if (diffHr < 24) return diffHr + 'h ago';
    if (diffDay < 7) return diffDay + 'd ago';

    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return date.getDate() + ' ' + months[date.getMonth()] + (date.getFullYear() !== now.getFullYear() ? ' ' + date.getFullYear() : '');
  }

  // ── Toast ──
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }

  // ── Router ──
  let currentPersonId = null;

  function navigateTo(route) {
    location.hash = route ? '/' + route : '/';
  }

  function handleRoute() {
    const hash = location.hash.slice(1) || '/';
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

    if (hash.startsWith('/person/')) {
      const personPart = hash.split('/person/')[1];
      const openExpenseForm = personPart.includes('?addexpense');
      currentPersonId = personPart.split('?')[0];
      document.getElementById('view-person').classList.add('active');
      renderPersonDetail(openExpenseForm);
    } else if (hash === '/settings') {
      document.getElementById('view-settings').classList.add('active');
      renderSettings();
    } else {
      currentPersonId = null;
      document.getElementById('view-home').classList.add('active');
      renderHome();
    }
  }

  window.addEventListener('hashchange', handleRoute);

  // ── Dashboard ──
  function renderDashboard() {
    const container = document.getElementById('dashboard');
    const people = Store.getPeople();

    if (people.length === 0) {
      container.innerHTML = '';
      return;
    }

    const totalDue = Store.getTotalDue();
    const peopleWithDue = people.filter(p => Store.getDueForPerson(p.id) > 0).length;

    // Find who owes most
    let maxDue = 0;
    let maxPerson = null;
    people.forEach(p => {
      const due = Store.getDueForPerson(p.id);
      if (due > maxDue) { maxDue = due; maxPerson = p; }
    });

    container.innerHTML = '';

    const dashboard = document.createElement('div');
    dashboard.className = 'dashboard';

    const totalDiv = document.createElement('div');
    totalDiv.className = 'dashboard-total';

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = 'Total Due to You';
    totalDiv.appendChild(label);

    const amount = document.createElement('div');
    amount.className = 'amount';
    amount.textContent = formatINR(totalDue);
    totalDiv.appendChild(amount);

    dashboard.appendChild(totalDiv);

    const stats = document.createElement('div');
    stats.className = 'dashboard-stats';

    const stat1 = document.createElement('div');
    stat1.className = 'stat-card';
    const s1v = document.createElement('div');
    s1v.className = 'stat-value';
    s1v.textContent = people.length;
    const s1l = document.createElement('div');
    s1l.className = 'stat-label';
    s1l.textContent = 'People';
    stat1.appendChild(s1v);
    stat1.appendChild(s1l);

    const stat2 = document.createElement('div');
    stat2.className = 'stat-card';
    const s2v = document.createElement('div');
    s2v.className = 'stat-value';
    s2v.textContent = peopleWithDue;
    const s2l = document.createElement('div');
    s2l.className = 'stat-label';
    s2l.textContent = 'Owe You';
    stat2.appendChild(s2v);
    stat2.appendChild(s2l);

    const stat3 = document.createElement('div');
    stat3.className = 'stat-card';
    const s3v = document.createElement('div');
    s3v.className = 'stat-value';
    s3v.textContent = maxPerson ? maxPerson.name.slice(0, 8) : '-';
    s3v.style.fontSize = '15px';
    const s3l = document.createElement('div');
    s3l.className = 'stat-label';
    s3l.textContent = maxDue > 0 ? 'Owes Most (' + formatINR(maxDue) + ')' : 'All Settled';
    stat3.appendChild(s3v);
    stat3.appendChild(s3l);

    stats.appendChild(stat1);
    stats.appendChild(stat2);
    stats.appendChild(stat3);
    dashboard.appendChild(stats);

    container.appendChild(dashboard);
  }

  // ── Recent Activity ──
  function renderRecentActivity() {
    const container = document.getElementById('recent-activity');
    const entries = Store.getAllEntries().slice(0, 5);

    if (entries.length === 0) {
      container.innerHTML = '';
      return;
    }

    container.innerHTML = '';

    const header = document.createElement('div');
    header.className = 'section-header';
    header.textContent = 'Recent Activity';
    container.appendChild(header);

    entries.forEach(entry => {
      const person = Store.getPerson(entry.personId);
      if (!person) return;

      const item = document.createElement('div');
      item.className = 'recent-item';

      const dot = document.createElement('div');
      dot.className = 'recent-dot ' + entry.type;

      const text = document.createElement('div');
      text.className = 'recent-text';
      if (entry.type === 'expense') {
        text.innerHTML = '';
        const strong = document.createElement('strong');
        strong.textContent = person.name;
        text.appendChild(strong);
        text.appendChild(document.createTextNode(' + ' + formatINR(entry.amount)));
        if (entry.note) text.appendChild(document.createTextNode(' \u00b7 ' + entry.note));
      } else {
        const strong = document.createElement('strong');
        strong.textContent = person.name;
        text.appendChild(strong);
        text.appendChild(document.createTextNode(' paid ' + formatINR(entry.amount)));
        if (entry.note) text.appendChild(document.createTextNode(' \u00b7 ' + entry.note));
      }

      const time = document.createElement('div');
      time.className = 'recent-time';
      time.textContent = formatDate(entry.createdAt);

      item.appendChild(dot);
      item.appendChild(text);
      item.appendChild(time);
      container.appendChild(item);
    });
  }

  // ── Home View ──
  function renderHome() {
    renderDashboard();

    const people = Store.getPeople();
    const container = document.getElementById('people-list');
    container.innerHTML = '';

    if (people.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      const icon = document.createElement('span');
      icon.className = 'icon';
      icon.textContent = '\ud83d\udc65';
      empty.appendChild(icon);
      const p = document.createElement('p');
      p.textContent = 'No people added yet';
      empty.appendChild(p);
      const p2 = document.createElement('p');
      p2.textContent = 'Add someone to start tracking';
      empty.appendChild(p2);
      container.appendChild(empty);
      renderRecentActivity();
      return;
    }

    const header = document.createElement('div');
    header.className = 'section-header';
    header.textContent = 'People';
    container.appendChild(header);

    const settings = Store.getSettings();

    people.forEach(person => {
      const due = Store.getDueForPerson(person.id);

      const row = document.createElement('div');
      row.className = 'card-row';

      const card = document.createElement('div');
      card.className = 'card';

      const content = document.createElement('div');
      content.className = 'card-content';
      content.onclick = () => navigateTo('person/' + person.id);

      const name = document.createElement('span');
      name.className = 'card-name';
      name.textContent = person.name;

      const dueDiv = document.createElement('div');
      dueDiv.className = 'card-due';
      const dueAmount = document.createElement('div');
      dueAmount.className = 'due-amount';
      dueAmount.textContent = formatINR(due);
      if (due <= 0) dueAmount.style.color = 'var(--green)';
      const dueLabel = document.createElement('div');
      dueLabel.className = 'due-label';
      dueLabel.textContent = due > 0 ? 'due' : 'settled';
      dueDiv.appendChild(dueAmount);
      dueDiv.appendChild(dueLabel);

      content.appendChild(name);
      content.appendChild(dueDiv);

      const delBtn = document.createElement('button');
      delBtn.className = 'card-delete';
      delBtn.textContent = '\u00d7';
      delBtn.setAttribute('aria-label', 'Delete ' + person.name);
      delBtn.onclick = (e) => {
        e.stopPropagation();
        if (confirm('Delete ' + person.name + ' and all their history?')) {
          Store.deletePerson(person.id);
          renderHome();
          showToast('Deleted ' + person.name);
        }
      };

      card.appendChild(content);
      card.appendChild(delBtn);

      // Quick increment
      const incBtn = document.createElement('button');
      incBtn.className = 'card-action increment';
      incBtn.textContent = '+' + formatINR(settings.incrementAmount);
      incBtn.setAttribute('aria-label', 'Add ' + formatINR(settings.incrementAmount) + ' to ' + person.name);
      incBtn.onclick = () => {
        Store.addEntry(person.id, settings.incrementAmount, 'expense', null);
        incBtn.classList.add('flash');
        setTimeout(() => incBtn.classList.remove('flash'), 200);
        dueAmount.textContent = formatINR(Store.getDueForPerson(person.id));
        dueLabel.textContent = 'due';
        dueAmount.style.color = '';
        renderDashboard();
        renderRecentActivity();
        showToast(person.name + ' +' + formatINR(settings.incrementAmount));
      };

      // Add expense
      const expBtn = document.createElement('button');
      expBtn.className = 'card-action expense';
      expBtn.textContent = '+Exp';
      expBtn.setAttribute('aria-label', 'Add custom expense for ' + person.name);
      expBtn.onclick = () => navigateTo('person/' + person.id + '?addexpense');

      row.appendChild(card);
      row.appendChild(incBtn);
      row.appendChild(expBtn);
      container.appendChild(row);
    });

    renderRecentActivity();
  }

  function toggleAddPerson() {
    const form = document.getElementById('add-person-form');
    form.classList.toggle('open');
    if (form.classList.contains('open')) {
      document.getElementById('person-name-input').focus();
    }
  }

  function addPerson() {
    const input = document.getElementById('person-name-input');
    const name = input.value.trim();
    if (!name) { showToast('Enter a name'); return; }
    if (name.length > 50) { showToast('Name too long (max 50 chars)'); return; }

    const existing = Store.getPeople().find(p => p.name.toLowerCase() === name.toLowerCase());
    if (existing && !confirm(name + ' already exists. Add anyway?')) return;

    Store.addPerson(name);
    input.value = '';
    document.getElementById('add-person-form').classList.remove('open');
    renderHome();
    showToast('Added ' + name);
  }

  document.getElementById('person-name-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addPerson();
  });

  // ── Person Detail View ──
  function renderPersonDetail(openExpenseForm) {
    const person = Store.getPerson(currentPersonId);
    if (!person) { navigateTo(''); return; }

    document.getElementById('person-name').textContent = person.name;

    const due = Store.getDueForPerson(currentPersonId);
    const dueEl = document.getElementById('person-due-amount');
    dueEl.textContent = formatINR(due);
    dueEl.className = 'due-amount' + (due <= 0 ? ' settled' : '');

    const settings = Store.getSettings();
    document.getElementById('increment-btn').textContent = '+ ' + formatINR(settings.incrementAmount);

    // Forms
    const expForm = document.getElementById('add-expense-form');
    const settleForm = document.getElementById('settle-form');

    if (openExpenseForm) {
      expForm.classList.add('open');
      settleForm.classList.remove('open');
      document.getElementById('expense-amount-input').value = '';
      document.getElementById('expense-note-input').value = '';
      setTimeout(() => document.getElementById('expense-amount-input').focus(), 100);
    } else {
      expForm.classList.remove('open');
      settleForm.classList.remove('open');
    }

    // Set settle full amount
    document.getElementById('settle-full-btn').textContent = 'Pay Full (' + formatINR(Math.max(0, due)) + ')';

    renderHistory();
  }

  function quickIncrement() {
    const settings = Store.getSettings();
    Store.addEntry(currentPersonId, settings.incrementAmount, 'expense', null);
    renderPersonDetail();

    const btn = document.getElementById('increment-btn');
    btn.classList.add('flash');
    setTimeout(() => btn.classList.remove('flash'), 200);

    showToast('Added ' + formatINR(settings.incrementAmount));
  }

  function toggleAddExpense() {
    const form = document.getElementById('add-expense-form');
    document.getElementById('settle-form').classList.remove('open');
    form.classList.toggle('open');
    if (form.classList.contains('open')) {
      document.getElementById('expense-amount-input').value = '';
      document.getElementById('expense-note-input').value = '';
      document.getElementById('expense-amount-input').focus();
    }
  }

  function toggleSettleForm() {
    const form = document.getElementById('settle-form');
    document.getElementById('add-expense-form').classList.remove('open');
    form.classList.toggle('open');
    if (form.classList.contains('open')) {
      document.getElementById('settle-amount-input').value = '';
      document.getElementById('settle-note-input').value = '';
      document.getElementById('settle-amount-input').focus();
    }
  }

  function addExpense() {
    const amountInput = document.getElementById('expense-amount-input');
    const noteInput = document.getElementById('expense-note-input');
    const amount = parseInt(amountInput.value, 10);

    if (!amount || amount < 1) { showToast('Enter a valid amount'); return; }
    if (amount > 999999) { showToast('Amount too large'); return; }

    Store.addEntry(currentPersonId, amount, 'expense', noteInput.value.trim() || null);
    amountInput.value = '';
    noteInput.value = '';
    document.getElementById('add-expense-form').classList.remove('open');
    renderPersonDetail();
    showToast('Added ' + formatINR(amount));
  }

  function settlePartial() {
    const amountInput = document.getElementById('settle-amount-input');
    const noteInput = document.getElementById('settle-note-input');
    const amount = parseInt(amountInput.value, 10);

    if (!amount || amount < 1) { showToast('Enter a valid amount'); return; }
    if (amount > 999999) { showToast('Amount too large'); return; }

    Store.addEntry(currentPersonId, amount, 'payment', noteInput.value.trim() || null);
    amountInput.value = '';
    noteInput.value = '';
    document.getElementById('settle-form').classList.remove('open');
    renderPersonDetail();
    showToast('Payment of ' + formatINR(amount) + ' recorded');
  }

  function settleFull() {
    const due = Store.getDueForPerson(currentPersonId);
    if (due <= 0) { showToast('Nothing due'); return; }

    const noteInput = document.getElementById('settle-note-input');
    Store.addEntry(currentPersonId, due, 'payment', noteInput.value.trim() || 'Full settlement');
    noteInput.value = '';
    document.getElementById('settle-form').classList.remove('open');
    renderPersonDetail();
    showToast('Fully settled!');
  }

  document.getElementById('expense-amount-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addExpense();
  });
  document.getElementById('settle-amount-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') settlePartial();
  });

  // ── History ──
  function renderHistory() {
    const entries = Store.getEntries(currentPersonId);
    const container = document.getElementById('history-items');
    container.innerHTML = '';

    if (entries.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.style.padding = '24px';
      const p = document.createElement('p');
      p.textContent = 'No history yet';
      empty.appendChild(p);
      container.appendChild(empty);
      return;
    }

    entries.forEach(entry => {
      const item = document.createElement('div');
      item.className = 'history-item';

      const info = document.createElement('div');
      info.className = 'history-info';

      const amtRow = document.createElement('div');
      amtRow.style.display = 'flex';
      amtRow.style.alignItems = 'center';

      const amt = document.createElement('span');
      amt.className = 'history-amount ' + (entry.type === 'expense' ? 'expense-type' : 'payment-type');
      amt.textContent = (entry.type === 'expense' ? '+' : '-') + formatINR(entry.amount);

      const tag = document.createElement('span');
      tag.className = 'history-tag ' + (entry.type === 'expense' ? 'tag-expense' : 'tag-payment');
      tag.textContent = entry.type === 'expense' ? 'Expense' : 'Payment';

      amtRow.appendChild(amt);
      amtRow.appendChild(tag);
      info.appendChild(amtRow);

      if (entry.note) {
        const note = document.createElement('div');
        note.className = 'history-note';
        note.textContent = entry.note;
        info.appendChild(note);
      }

      const date = document.createElement('div');
      date.className = 'history-date';
      date.textContent = formatDate(entry.createdAt);
      info.appendChild(date);

      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = '\u00d7';
      delBtn.setAttribute('aria-label', 'Delete entry');
      delBtn.onclick = () => {
        if (confirm('Delete this ' + entry.type + '?')) {
          Store.deleteEntry(entry.id);
          renderPersonDetail();
          showToast('Deleted');
        }
      };

      item.appendChild(info);
      item.appendChild(delBtn);
      container.appendChild(item);
    });
  }

  // ── Settings View ──
  function renderSettings() {
    const settings = Store.getSettings();
    document.getElementById('increment-amount-input').value = settings.incrementAmount;
    document.getElementById('saved-msg').classList.remove('show');
  }

  function saveSettings() {
    const input = document.getElementById('increment-amount-input');
    const amount = parseInt(input.value, 10);
    if (!amount || amount < 1) { showToast('Enter a valid amount'); return; }
    if (amount > 999999) { showToast('Amount too large'); return; }

    Store.updateSettings({ incrementAmount: amount });
    const msg = document.getElementById('saved-msg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2000);
    showToast('Increment set to ' + formatINR(amount));
  }

  // ── Init ──
  handleRoute();
  if (!location.hash || location.hash === '#') location.hash = '/';
</script>
</body>
</html>
